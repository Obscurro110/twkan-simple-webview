name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # required to create releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK (signed with fixed keystore)
      run: ./gradlew assembleDebug assembleRelease --stacktrace

    - name: Get version info
      id: ver
      run: |
        echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "code=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
        echo "name=1.0.$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Delete previous 'latest' release if exists
      if: github.event_name == 'push'
      run: |
        gh release delete latest --yes 2>/dev/null || true
        git push origin :refs/tags/latest 2>/dev/null || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release with APK
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "v${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})"
        body: |
          **版本：** `${{ steps.ver.outputs.name }}`
          **构建号：** `${{ steps.ver.outputs.code }}`
          **Commit：** `${{ steps.ver.outputs.short }}`

          直接下载 APK 安装即可，无需卸载旧版本。
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Debug APK (artifact backup)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
